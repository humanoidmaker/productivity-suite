version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: productivity
      POSTGRES_USER: productivity
      POSTGRES_PASSWORD: productivity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productivity"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      WORKHUB_DATABASE_URL: postgresql+asyncpg://productivity:productivity@postgres:5432/productivity
      WORKHUB_REDIS_URL: redis://redis:6379/0
      WORKHUB_CELERY_BROKER_URL: redis://redis:6379/1
      WORKHUB_CELERY_RESULT_BACKEND: redis://redis:6379/2
      WORKHUB_MINIO_ENDPOINT: minio:9000
      WORKHUB_DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      WORKHUB_DATABASE_URL: postgresql+asyncpg://productivity:productivity@postgres:5432/productivity
      WORKHUB_REDIS_URL: redis://redis:6379/0
      WORKHUB_CELERY_BROKER_URL: redis://redis:6379/1
      WORKHUB_CELERY_RESULT_BACKEND: redis://redis:6379/2
      WORKHUB_MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  celery-beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      WORKHUB_DATABASE_URL: postgresql+asyncpg://productivity:productivity@postgres:5432/productivity
      WORKHUB_REDIS_URL: redis://redis:6379/0
      WORKHUB_CELERY_BROKER_URL: redis://redis:6379/1
      WORKHUB_CELERY_RESULT_BACKEND: redis://redis:6379/2
      WORKHUB_MINIO_ENDPOINT: minio:9000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend-app:
    build: ./frontend-app
    ports:
      - "3000:80"
    depends_on:
      - backend

  frontend-admin:
    build: ./frontend-admin
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:

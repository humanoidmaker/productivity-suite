apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: productivity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: productivity/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: productivity-config
            - secretRef:
                name: productivity-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
